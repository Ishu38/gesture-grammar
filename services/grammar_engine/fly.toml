# MLAF Grammar Engine — Fly.io deployment config
# Backend FastAPI + SWI-Prolog service for the multi-modal-gesture-grammar demo

app = "mlaf-grammar-engine"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8300"

[http_service]
  internal_port = 8300
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
